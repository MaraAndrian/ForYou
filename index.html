<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ For You</title>
    <style>
        /* --- ACCUEIL ÉLÉGANT --- */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(ellipse at center, #1a0a0f 0%, #000 70%);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
            font-family: 'Courier New', monospace;
        }

        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a0a0f 0%, #000 70%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 2.5s ease-in-out;
            padding: 20px;
            box-sizing: border-box;
        }

        .welcome-text {
            color: #ecaebe;
            font-size: 2.5em;
            font-weight: bold;
            letter-spacing: 4px;
            text-shadow: 0 0 30px rgba(255, 179, 217, 0.4);
            text-align: center;
            font-family: 'Courier New', monospace;
            min-height: 1.2em;
        }

        .welcome-text.typing-done {
            animation: textPulse 4s ease-in-out infinite;
        }

        @keyframes textPulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        .it-guy {
            color: #ecaebe;
            font-size: 0.8em;
            letter-spacing: 2px;
            opacity: 0;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
            border: 1px solid rgba(236, 174, 190, 0.2);
            padding: 8px 20px;
            border-radius: 4px;
            background: rgba(236, 174, 190, 0.05);
            transition: opacity 1.5s ease;
        }

        .welcome-sub {
            color: #ecaebe;
            font-size: 1em;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(236, 174, 190, 0.3);
            text-align: center;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(to right, transparent, #ecaebe, transparent);
            margin: 15px auto;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .btn-enter {
            margin-top: 40px;
            padding: 12px 40px;
            font-size: 0.9em;
            font-family: 'Courier New', monospace;
            font-weight: 300;
            letter-spacing: 2px;
            background: transparent;
            color: #ecaebe;
            border: 1px solid rgba(236, 174, 190, 0.3);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.8s ease;
            text-transform: uppercase;
            position: relative;
            opacity: 0;
        }

        .btn-enter:hover {
            border-color: rgba(236, 174, 190, 0.6);
            box-shadow: 0 0 30px rgba(236, 174, 190, 0.15), inset 0 0 30px rgba(236, 174, 190, 0.05);
            transform: scale(1.05);
            color: #fff;
        }

        /* --- TON CŒUR --- */
        .heart-container {
            position: relative;
            width: 500px;
            height: 500px;
            transform-style: preserve-3d;
            opacity: 0;
            transition: opacity 2.5s ease-in-out;
        }

        .heart-container.show {
            opacity: 1;
        }

        .ui_love_word {
            position: absolute;
            left: 50%;
            top: 50%;
            font-family: Arial, sans-serif;
            font-size: 1.2em;
            font-weight: bold;
            color: #ecaebe;
            text-shadow: 0 0 10px #ffb3d9;
            white-space: nowrap;
            opacity: 0;
            animation: heart-anim 5s infinite linear;
            animation-play-state: paused;
        }

        .heart-container.show .ui_love_word {
            animation-play-state: running;
        }

        @keyframes heart-anim {
            0% {
                opacity: 0;
                transform: translate3d(0, 0, -20px) scale(0.8);
            }
            50% {
                opacity: 1;
                transform: translate3d(0, 0, 20px) scale(1.1);
            }
            100% {
                opacity: 0;
                transform: translate3d(0, 0, -20px) scale(0.8);
            }
        }

        /* --- DÉCORATIONS INTÉRIEURES (TOUTES EN #ecaebe) --- */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: #ecaebe;
            border-radius: 50%;
            animation: floatParticle 20s infinite linear;
            opacity: 0.15;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% {
                transform: translateY(-10vh) translateX(50px) scale(1);
                opacity: 0;
            }
        }

        /* Étoiles scintillantes */
        .star-deco {
            position: fixed;
            color: #ecaebe;
            font-size: 0.8em;
            animation: twinkle 2s infinite alternate;
            pointer-events: none;
            z-index: 0;
            font-family: Arial, sans-serif;
            opacity: 0.3;
        }

        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.5); }
            100% { opacity: 0.4; transform: scale(1.5); }
        }

        /* Lignes décoratives */
        .line-deco {
            position: fixed;
            width: 1px;
            height: 80px;
            background: linear-gradient(to bottom, transparent, #ecaebe, transparent);
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
        }

        /* Cœurs flottants décoratifs */
        .floating-heart {
            position: fixed;
            color: #ecaebe;
            font-size: 1.5em;
            animation: floatUp 15s infinite linear;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        /* --- MUSIQUE --- */
        #bg-music {
            display: none;
        }

        .music-indicator {
            position: fixed;
            bottom: 30px;
            right: 30px;
            color: #ecaebe;
            font-size: 0.7em;
            letter-spacing: 2px;
            z-index: 1;
            font-family: 'Courier New', monospace;
            opacity: 0.3;
        }

        .terminal-line {
            position: fixed;
            bottom: 80px;
            left: 30px;
            color: #ecaebe;
            font-size: 0.6em;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            z-index: 1;
            pointer-events: none;
            opacity: 0.15;
        }

        /* --- RESPONSIVE (Téléphone) --- */
        @media (max-width: 768px) {
            .welcome-text {
                font-size: 2.2em;
                letter-spacing: 3px;
            }
            
            .it-guy {
                font-size: 0.7em;
                padding: 6px 15px;
            }
            
            .welcome-sub {
                font-size: 0.9em;
            }
            
            .btn-enter {
                padding: 12px 30px;
                font-size: 0.8em;
                margin-top: 30px;
            }
            
            .divider {
                width: 50px;
            }
            
            .heart-container {
                width: 350px;
                height: 350px;
            }
            
            .ui_love_word {
                font-size: 0.9em;
            }
            
            .star-deco {
                font-size: 0.6em;
            }
            
            .floating-heart {
                font-size: 1.2em;
            }
            
            .line-deco {
                height: 60px;
            }
            
            .music-indicator {
                font-size: 0.6em;
                bottom: 15px;
                right: 15px;
            }
            
            .terminal-line {
                font-size: 0.5em;
                bottom: 50px;
                left: 15px;
            }

            /* Réduire les décorations sur téléphone pour meilleur cadrage */
            .star-deco {
                display: none;
            }
            .star-deco:nth-child(1),
            .star-deco:nth-child(2),
            .star-deco:nth-child(3),
            .star-deco:nth-child(4),
            .star-deco:nth-child(5) {
                display: block;
            }
            
            .floating-heart {
                display: none;
            }
            .floating-heart:nth-child(1),
            .floating-heart:nth-child(2),
            .floating-heart:nth-child(3) {
                display: block;
            }
            
            .line-deco {
                display: none;
            }
            .line-deco:nth-child(1),
            .line-deco:nth-child(2) {
                display: block;
            }
        }

        @media (max-width: 480px) {
            .welcome-text {
                font-size: 1.8em;
                letter-spacing: 2px;
            }
            
            .heart-container {
                width: 280px;
                height: 280px;
            }
            
            .ui_love_word {
                font-size: 0.7em;
            }
            
            .btn-enter {
                padding: 10px 25px;
                font-size: 0.7em;
            }
            
            .it-guy {
                font-size: 0.6em;
                padding: 4px 12px;
            }
            
            .welcome-sub {
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>

    <!-- DÉCORATIONS INTÉRIEURES -->
    <div id="particles"></div>
    
    <!-- Étoiles -->
    <div class="star-deco" style="top: 5%; left: 3%;">✦</div>
    <div class="star-deco" style="top: 12%; right: 6%; animation-delay: 0.5s;">✦</div>
    <div class="star-deco" style="top: 25%; left: 8%; animation-delay: 1s;">✦</div>
    <div class="star-deco" style="top: 18%; right: 12%; animation-delay: 1.5s;">✦</div>
    <div class="star-deco" style="top: 35%; left: 2%; animation-delay: 0.8s;">✦</div>
    <div class="star-deco" style="top: 40%; right: 4%; animation-delay: 2s;">✦</div>
    <div class="star-deco" style="top: 55%; left: 6%; animation-delay: 1.2s;">✦</div>
    <div class="star-deco" style="top: 60%; right: 8%; animation-delay: 0.3s;">✦</div>
    <div class="star-deco" style="top: 70%; left: 3%; animation-delay: 1.8s;">✦</div>
    <div class="star-deco" style="top: 75%; right: 5%; animation-delay: 0.7s;">✦</div>
    <div class="star-deco" style="top: 85%; left: 7%; animation-delay: 2.5s;">✦</div>
    <div class="star-deco" style="top: 90%; right: 3%; animation-delay: 1.4s;">✦</div>
    <div class="star-deco" style="top: 45%; left: 12%; animation-delay: 0.9s;">✦</div>
    <div class="star-deco" style="top: 50%; right: 15%; animation-delay: 1.7s;">✦</div>
    <div class="star-deco" style="top: 15%; left: 15%; animation-delay: 2.2s;">✦</div>
    <div class="star-deco" style="top: 65%; right: 12%; animation-delay: 0.4s;">✦</div>
    <div class="star-deco" style="top: 30%; left: 18%; animation-delay: 1.1s;">✦</div>
    <div class="star-deco" style="top: 80%; right: 18%; animation-delay: 1.6s;">✦</div>
    <div class="star-deco" style="top: 10%; left: 25%; animation-delay: 0.6s;">✦</div>
    <div class="star-deco" style="top: 95%; right: 10%; animation-delay: 2.8s;">✦</div>

    <!-- Lignes -->
    <div class="line-deco" style="left: 10%; top: 20%;"></div>
    <div class="line-deco" style="right: 10%; top: 20%; animation-delay: 1s;"></div>
    <div class="line-deco" style="left: 25%; top: 40%; animation-delay: 2s;"></div>
    <div class="line-deco" style="right: 25%; top: 40%; animation-delay: 0.5s;"></div>
    <div class="line-deco" style="left: 40%; top: 60%; animation-delay: 3s;"></div>
    <div class="line-deco" style="right: 40%; top: 60%; animation-delay: 1.5s;"></div>
    <div class="line-deco" style="left: 55%; top: 30%; animation-delay: 0.8s;"></div>
    <div class="line-deco" style="right: 55%; top: 30%; animation-delay: 2.3s;"></div>
    <div class="line-deco" style="left: 70%; top: 70%; animation-delay: 1.2s;"></div>
    <div class="line-deco" style="right: 70%; top: 70%; animation-delay: 3.5s;"></div>
    <div class="line-deco" style="left: 85%; top: 50%; animation-delay: 2.8s;"></div>
    <div class="line-deco" style="right: 85%; top: 50%; animation-delay: 0.9s;"></div>

    <!-- Cœurs flottants -->
    <div class="floating-heart" style="left: 3%; animation-duration: 18s;">♥</div>
    <div class="floating-heart" style="right: 3%; animation-duration: 22s; animation-delay: 4s;">♥</div>
    <div class="floating-heart" style="left: 12%; animation-duration: 20s; animation-delay: 8s;">♥</div>
    <div class="floating-heart" style="right: 12%; animation-duration: 16s; animation-delay: 2s;">♥</div>
    <div class="floating-heart" style="left: 25%; animation-duration: 24s; animation-delay: 6s;">♥</div>
    <div class="floating-heart" style="right: 25%; animation-duration: 19s; animation-delay: 10s;">♥</div>
    <div class="floating-heart" style="left: 40%; animation-duration: 21s; animation-delay: 1s;">♥</div>
    <div class="floating-heart" style="right: 40%; animation-duration: 17s; animation-delay: 7s;">♥</div>
    <div class="floating-heart" style="left: 60%; animation-duration: 23s; animation-delay: 5s;">♥</div>
    <div class="floating-heart" style="right: 60%; animation-duration: 15s; animation-delay: 9s;">♥</div>
    <div class="floating-heart" style="left: 75%; animation-duration: 26s; animation-delay: 3s;">♥</div>
    <div class="floating-heart" style="right: 75%; animation-duration: 14s; animation-delay: 11s;">♥</div>
    <div class="floating-heart" style="left: 90%; animation-duration: 28s; animation-delay: 0s;">♥</div>
    <div class="floating-heart" style="right: 90%; animation-duration: 13s; animation-delay: 12s;">♥</div>

    <!-- ÉCRAN D'ACCUEIL -->
    <div id="welcome-screen">
        <div class="welcome-text" id="typing-text"></div>
        <div class="divider" id="divider"></div>
        <div class="it-guy" id="it-guy">♥ echo "I love you" ♥</div>
        <div class="welcome-sub" id="sub-text">My love</div>
        <button class="btn-enter" id="btn-enter" onclick="enterHeart()">Open my heart</button>
        <div class="music-indicator" style="position: absolute; bottom: 30px;">♫</div>
    </div>

    <!-- TON CŒUR -->
    <div class="heart-container" id="heart-container"></div>

    <!-- TOUCHE IT GUY -->
    <div class="terminal-line">$ _</div>

    <!-- MUSIQUE -->
    <audio id="bg-music" loop>
        <source src="raindance.mpeg" type="audio/mpeg">
    </audio>

    <script>
        // --- PARTICULES ---
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 2 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 20 + 20) + 's';
                particle.style.animationDelay = Math.random() * 20 + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // --- TON CŒUR ---
        const container = document.getElementById('heart-container');
        const text = "I love you";
        const wordCount = 80;
        const scale = 12;

        function createHeart() {
            for (let i = 0; i < wordCount; i++) {
                const span = document.createElement('span');
                span.classList.add('ui_love_word');
                span.innerText = text;

                const t = (i / wordCount) * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);

                const posX = x * scale;
                const posY = y * scale;

                span.style.left = `calc(50% + ${posX}px)`;
                span.style.top = `calc(50% - ${posY}px)`;
                span.style.transform = `translate(-50%, -50%)`;

                const delay = (t / (Math.PI * 2)) * 5;
                span.style.animationDelay = delay + 's';

                container.appendChild(span);
            }
        }
        createHeart();

        // --- TYPING EFFECT + APPARITION FLUIDE ---
        const textToType = "For you";
        let charIndex = 0;
        const typingText = document.getElementById('typing-text');

        function typeText() {
            if (charIndex < textToType.length) {
                typingText.textContent += textToType.charAt(charIndex);
                charIndex++;
                setTimeout(typeText, 150);
            } else {
                typingText.classList.add('typing-done');
                setTimeout(showRemaining, 300);
            }
        }

        function showRemaining() {
            document.getElementById('divider').style.opacity = '1';
            document.getElementById('it-guy').style.opacity = '0.7';
            document.getElementById('sub-text').style.opacity = '1';
            document.getElementById('btn-enter').style.opacity = '1';
        }

        typeText();

        // --- ENTRÉE ---
        let musicStarted = false;

        function enterHeart() {
            const music = document.getElementById('bg-music');
            if (!musicStarted) {
                music.volume = 0.3;
                music.play().catch(e => {});
                musicStarted = true;
            }

            const welcome = document.getElementById('welcome-screen');
            welcome.style.opacity = '0';
            setTimeout(() => {
                welcome.style.display = 'none';
            }, 2500);

            document.getElementById('heart-container').classList.add('show');
        }

        document.addEventListener('click', function() {
            if (!musicStarted) {
                const music = document.getElementById('bg-music');
                music.volume = 0.3;
                music.play().catch(e => {});
                musicStarted = true;
            }
        }, { once: true });
    </script>
</body>
</html>
